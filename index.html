<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>올클스터디 - 중등 2학년 전과목 전단원 뇌과학 학습앱</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="coring">
  <!-- Dashboard View -->
  <div class="app-container" id="dashboard-view">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="logo">
        <h1 class="logo-text">올클스터디</h1>
      </div>
      <ul class="nav-links">
        <li class="active">
          <a href="#">
            <i data-lucide="home" class="nav-icon"></i>
            <span>학습</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i data-lucide="shield" class="nav-icon"></i>
            <span>리더보드</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i data-lucide="target" class="nav-icon"></i>
            <span>퀘스트</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i data-lucide="shopping-cart" class="nav-icon"></i>
            <span>상점</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i data-lucide="user" class="nav-icon"></i>
            <span>프로필</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Unit Header (Banner with expandable Guidebook) -->
      <div class="unit-header" id="unit-header-card">
        <div class="unit-header-main">
          <div class="unit-info">
            <h2 id="current-unit-title">유닛 1</h2>
            <p id="current-unit-desc">단원 정보 로딩 중...</p>
          </div>
          <button class="guidebook-btn" id="guidebook-btn">
            <i data-lucide="book-open" id="guidebook-btn-icon"></i>
            <span id="guidebook-btn-text">학습 안내</span>
          </button>
        </div>
        
        <!-- Expanded Guidebook Content -->
        <div class="unit-guidebook-expanded" id="guidebook-expanded" style="display: none;">
          <h3 class="guidebook-expanded-title">💡 핵심 요약 가이드 (뇌과학 연상 공식)</h3>
          <div class="guidebook-concepts-grid" id="guidebook-concepts-grid">
            <!-- Concepts cards injected by JS -->
          </div>
        </div>
      </div>

      <div class="learning-path">
        <!-- SVG Path Line (Background) -->
        <svg class="path-line" viewBox="0 0 100 500" preserveAspectRatio="none">
          <path d="M50 0 C 80 100, 20 200, 50 300 C 80 400, 20 500, 50 600" fill="none" stroke="#e5e5e5" stroke-width="12" stroke-linecap="round"></path>
        </svg>

        <!-- Lesson Nodes (Generated dynamically by JS) -->
      </div>
    </main>

    <!-- Right Panel -->
    <aside class="right-panel">
      <!-- Top Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item subject-badge" id="current-subject-badge">
          <i data-lucide="book-open"></i>
          <span class="value" id="subject-badge-text">수학</span>
        </div>
        <div class="stat-item streak">
          <i data-lucide="flame" fill="currentColor"></i>
          <span class="value">0</span>
        </div>
        <div class="stat-item gems">
          <i data-lucide="gem" fill="currentColor"></i>
          <span class="value">500</span>
        </div>
        <div class="stat-item hearts">
          <i data-lucide="heart" fill="currentColor"></i>
          <span class="value">5</span>
        </div>
      </div>

      <!-- League Card -->
      <div class="card league-card">
        <h3>리더보드 잠금 해제</h3>
        <div class="card-content">
          <i data-lucide="shield" size="48" color="#ffc800"></i>
          <p>레슨을 완료하여 학교 친구들과 실시간 랭킹 경쟁을 시작해 보세요!</p>
        </div>
      </div>

      <!-- Quests Card -->
      <div class="card quests-card">
        <div class="card-header">
          <h3>일일 퀘스트</h3>
          <a href="#" class="view-all">모두 보기</a>
        </div>
        <ul class="quest-list">
          <li class="quest-item">
            <i data-lucide="target" class="quest-icon" color="#ff9600"></i>
            <div class="quest-details">
              <h4>10 XP 획득하기</h4>
              <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
              </div>
            </div>
          </li>
          <li class="quest-item">
            <i data-lucide="check-circle" class="quest-icon" color="#1cb0f6"></i>
            <div class="quest-details">
              <h4>1개 레슨 완료하기</h4>
              <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
              </div>
            </div>
          </li>
        </ul>
      </div>
      
      <!-- Footer links -->
      <div class="footer-links">
        <a href="#">올클스터디 정보</a> · 
        <a href="#">소개</a> · 
        <a href="#">이용약관</a> · 
        <a href="#">개인정보 처리방침</a>
      </div>
    </aside>
  </div>

  <!-- Lesson View -->
  <div id="lesson-view" class="lesson-view" style="display: none;">
    <div class="lesson-header">
      <button id="close-lesson" class="close-btn"><i data-lucide="x"></i></button>
      <div class="lesson-progress-bar">
        <div class="lesson-progress-fill" id="lesson-progress-fill" style="width: 0%;"></div>
      </div>
      <div class="lesson-hearts" id="lesson-hearts" style="display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 16px; color: var(--color-cardinal); margin-left: 8px;">
        <i data-lucide="heart" fill="currentColor" style="width: 24px; height: 24px;"></i>
        <span class="value" id="lesson-hearts-value">5</span>
      </div>
    </div>
    
    <div class="lesson-content">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; margin-bottom: 32px; width: 100%;">
        <div class="lesson-type-badge" id="lesson-type-badge">뇌과학 인출</div>
        <h2 id="question-text">질문이 여기에 표시됩니다</h2>
        <button id="play-question-sound" class="sound-btn" style="display: none;">
          <i data-lucide="volume-2"></i>
          <span>듣기</span>
        </button>
      </div>
      <div class="options-container" id="options-container">
        <!-- Options injected by JS -->
      </div>
    </div>
    
    <div class="lesson-footer" id="lesson-footer">
      <div class="feedback-message" id="feedback-message"></div>
      <button class="check-btn" id="check-btn" disabled>확인</button>
    </div>
  </div>

  <!-- Curriculum Selector Modal -->
  <div id="curriculum-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>학습 범위 설정</h2>
        <button id="close-curriculum" class="close-modal-btn"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="modal-selector-group">
          <label for="subject-select">학습 과목</label>
          <select id="subject-select" class="modal-dropdown">
            <!-- Injected by JS -->
          </select>
        </div>
        <div class="modal-selector-group">
          <label for="unit-select">대단원</label>
          <select id="unit-select" class="modal-dropdown">
            <!-- Injected by JS -->
          </select>
        </div>
        <div class="modal-selector-group">
          <label for="subunit-select">소단원</label>
          <select id="subunit-select" class="modal-dropdown">
            <!-- Injected by JS -->
          </select>
        </div>
        <button id="apply-curriculum-btn" class="apply-btn">학습 시작하기</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=20260613a"></script>
</body>
</html>
